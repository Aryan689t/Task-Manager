<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOGlog</title>
    <link rel="stylesheet" href="log.css">
</head>
<body>
    <div class="heading"><h1 id="h1">TASK MANAGER </h1></div>
    <div class="main">
      <div class="postbox" id="postbox">
        <div id="posttitle">PREVIOUS TASKS</div>
        </div >
      <div >
        <textarea class="write" name="write here" id="" placeholder="title

 {
   body
 }" rows="40" cols="150"></textarea>
      </div>
        <div class="actions">
          <div id="save"><p>SAVE</p></div>
          <div id="clrall"><p>CLEAR ALL</p></div>
          <div id="edit">EDIT</div>
          <div id="complete">COMPLETE</div>
          <div id="del"><p>DEL TASK</p></div>
        </div>
    </div>
    <script src="Bloglog.js"></script>
</body>
</html>
